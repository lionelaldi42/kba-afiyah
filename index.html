<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F0;min-height:100vh}

/* ── LOADING SCREEN ── */
#loading{position:fixed;inset:0;background:#0B3020;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;overflow:hidden;transition:opacity 0.6s ease}
#loading.out{opacity:0;pointer-events:none}
.c1{position:absolute;width:520px;height:520px;border-radius:50%;border:0.5px solid rgba(198,147,40,0.1);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3.5s ease-in-out infinite}
.c2{position:absolute;width:380px;height:380px;border-radius:50%;border:0.5px solid rgba(198,147,40,0.15);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3.5s ease-in-out infinite 0.5s}
.c3{position:absolute;width:260px;height:260px;border-radius:50%;border:0.5px solid rgba(198,147,40,0.22);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3.5s ease-in-out infinite 1s}
.dot-a{position:absolute;width:6px;height:6px;border-radius:50%;background:#C69328;opacity:0.4;top:18%;left:12%;animation:float 4s ease-in-out infinite}
.dot-b{position:absolute;width:4px;height:4px;border-radius:50%;background:#C69328;opacity:0.3;bottom:20%;right:14%;animation:float 4s ease-in-out infinite 2s}
.dot-c{position:absolute;width:3px;height:3px;border-radius:50%;background:#9FD4B8;opacity:0.35;top:22%;right:18%;animation:float 5s ease-in-out infinite 1s}
.ld-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
.ld-dot{width:10px;height:10px;border-radius:50%;background:#C69328;margin-bottom:28px;animation:glow 2s ease-in-out infinite}
.ld-title{font-size:56px;font-weight:600;color:#F0EBE0;letter-spacing:-0.02em;line-height:1;animation:fadeUp 0.8s ease forwards;opacity:0;animation-delay:0.2s}
.ld-title span{color:#C69328}
.ld-sub{font-size:12px;color:#7AA88A;margin-top:10px;letter-spacing:0.07em;text-transform:uppercase;animation:fadeUp 0.8s ease forwards;opacity:0;animation-delay:0.5s}
.ld-div{width:40px;height:0.5px;background:#C69328;opacity:0.5;margin:24px 0;animation:fadeUp 0.8s ease forwards;opacity:0;animation-delay:0.7s}
.ld-bar-row{display:flex;align-items:center;gap:10px;animation:fadeUp 0.8s ease forwards;opacity:0;animation-delay:1s}
.ld-bar{width:130px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.ld-fill{width:0%;height:100%;background:#C69328;border-radius:2px;animation:load 2.2s ease forwards;animation-delay:1.2s}
.ld-bar-txt{font-size:11px;color:#5A8A6A;letter-spacing:0.04em}
.ld-btn{margin-top:32px;background:transparent;border:0.5px solid rgba(198,147,40,0.5);color:#C69328;font-size:12px;font-family:inherit;padding:11px 32px;border-radius:20px;cursor:pointer;letter-spacing:0.07em;text-transform:uppercase;animation:fadeUp 0.8s ease forwards;opacity:0;animation-delay:2.2s;transition:background 0.2s,border-color 0.2s}
.ld-btn:hover{background:rgba(198,147,40,0.1);border-color:#C69328}
.ld-footer{position:absolute;bottom:24px;font-size:11px;color:rgba(122,168,138,0.45);letter-spacing:0.04em;animation:fadeUp 0.8s ease forwards;opacity:0;animation-delay:1.8s}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.04);opacity:0.65}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes load{0%{width:0%}60%{width:72%}80%{width:88%}100%{width:100%}}

/* ── APP ── */
#app{display:none;padding:24px 16px;min-height:100vh}
#app.show{display:block}
.wrap{width:100%;max-width:900px;margin:0 auto;border-radius:14px;overflow:hidden;background:#fff;border:1px solid #E0E0D8}
.topbar{background:#0B3020;padding:14px 22px;display:flex;align-items:center;justify-content:space-between}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-dot{width:8px;height:8px;border-radius:50%;background:#C69328;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:#F0EBE0;letter-spacing:0.02em}
.tb-sub{font-size:11px;color:#7AA88A;margin-top:1px}
.tb-badge{background:#1A5438;border:1px solid #2A7050;border-radius:20px;padding:4px 12px;font-size:11px;color:#A8C4B4}
.layout{display:grid;grid-template-columns:210px 1fr;min-height:560px}
.sidebar{background:#0F3826;border-right:1px solid #1A5438}
.sb-sec{padding:14px 16px 6px;font-size:10px;color:#5A8A6A;letter-spacing:0.08em;text-transform:uppercase}
.fi{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:background 0.15s}
.fi:hover{background:rgba(255,255,255,0.05)}
.fi.active{background:rgba(198,147,40,0.12);border-left-color:#C69328}
.fi-row{display:flex;align-items:center;gap:9px}
.fi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.fi-name{font-size:13px;font-weight:500;color:#E8DDD0;line-height:1.3}
.fi-count{font-size:11px;color:#7AA88A;margin-top:1px}
.fi-dots{display:flex;gap:4px;margin-top:6px;padding-left:41px}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.main{padding:20px;background:#fff;overflow:auto}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#666;cursor:pointer;margin-bottom:14px;background:none;border:none;padding:0}
.back-btn:hover{color:#111}
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:#F5F5F0;border-radius:10px;padding:13px 15px}
.stat-lbl{font-size:11px;color:#888;margin-bottom:5px}
.stat-num{font-size:26px;font-weight:600;color:#111;line-height:1}
.stat-sub{font-size:11px;color:#aaa;margin-top:3px}
.sec-hd{font-size:10px;font-weight:600;color:#888;letter-spacing:0.06em;margin-bottom:10px;text-transform:uppercase}
.fam-card{background:#fff;border:1px solid #E8E8E0;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.fam-card:hover{border-color:#C0C0B8}
.fam-card-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.fam-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.fam-card-name{font-size:15px;font-weight:600;color:#111}
.fam-card-sub{font-size:12px;color:#888;margin-top:2px}
.mem-row{display:flex;gap:8px;flex-wrap:wrap}
.mm{display:flex;align-items:center;gap:7px;background:#F5F5F0;border-radius:8px;padding:7px 10px;flex:1;min-width:120px;cursor:pointer;transition:background 0.15s}
.mm:hover{background:#EAEAE3}
.mm-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.mm-name{font-size:12px;font-weight:500;color:#111;line-height:1.2}
.mm-age{font-size:11px;color:#888}
.fv-hd{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#0B3020;border-radius:12px;margin-bottom:16px}
.fv-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600}
.fv-title{font-size:17px;font-weight:600;color:#F0EBE0}
.fv-sub{font-size:12px;color:#7AA88A;margin-top:3px}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.mc{background:#fff;border:1px solid #E8E8E0;border-radius:12px;padding:14px;cursor:pointer;transition:border-color 0.15s}
.mc:hover{border-color:#C0C0B8}
.mc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.mc-name{font-size:14px;font-weight:500;color:#111}
.mc-sub{font-size:12px;color:#888;margin-top:2px}
.mc-ps{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.mc-p{background:#F5F5F0;border-radius:8px;padding:7px 9px}
.mc-pl{font-size:10px;color:#999;margin-bottom:3px}
.mc-pv{font-size:14px;font-weight:600}
.mc-pu{font-size:10px;color:#aaa}
.ind-hd{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #E8E8E0}
.ind-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}

.ind-sub{font-size:13px;color:#888;margin-top:3px}
.p4g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.p4c{background:#fff;border:1px solid #E8E8E0;border-radius:10px;padding:11px 12px;border-top:3px solid transparent}
.p4l{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px}
.p4v{font-size:22px;font-weight:600;color:#111;line-height:1}
.p4u{font-size:10px;color:#aaa;margin-top:2px}
.p4s{font-size:11px;font-weight:500;margin-top:5px}
.cw{background:#fff;border:1px solid #E8E8E0;border-radius:10px;padding:14px;margin-bottom:14px}
.ctabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ctab{font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid #E0E0D8;color:#666;background:transparent;transition:all 0.15s}
.ctab:hover{background:#F5F5F0}
.ctab.active{background:#0B3020;color:#F0EBE0;border-color:#0B3020}
.ht{width:100%;border-collapse:collapse;font-size:12px}
.ht th{text-align:left;padding:7px 9px;font-size:10px;color:#888;font-weight:600;border-bottom:1px solid #E8E8E0;text-transform:uppercase;letter-spacing:0.04em}
.ht td{padding:8px 9px;border-bottom:1px solid #E8E8E0;color:#111}
.ht tr:last-child td{border-bottom:none}
.loz{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;background:#EBF5EF;color:#0F6E56}
.na-ban{background:#FFF8EC;border:1px solid #F0D890;border-radius:8px;padding:10px 14px;font-size:12px;color:#7A6010;margin-bottom:12px}
@media(max-width:600px){.layout{grid-template-columns:1fr}.sidebar{display:none}.p4g{grid-template-columns:repeat(2,1fr)}.mg{grid-template-columns:1fr}.ov-stats{grid-template-columns:1fr}}
</style>
</head>

function gc(s){return s==="ok"?"#27AE60":s==="warn"?"#F39C12":s==="danger"?"#E74C3C":"#BBB";}
function gl(s){return s==="ok"?"Normal":s==="warn"?"Borderline":s==="danger"?"Tinggi":"Belum dicek";}
function gmos(m){const l=m.data[m.data.length-1];for(const p of PARAMS){if(gs(p,l[p.key])==="danger")return"danger";}for(const p of PARAMS){if(gs(p,l[p.key])==="warn")return"warn";}if(PARAMS.every(p=>l[p.key]===null))return"na";return"ok";}
function glv(m,k){for(let i=m.data.length-1;i>=0;i--){if(m.data[i][k]!==null)return m.data[i][k];}return null;}
function fmt(v){if(v===null)return"—";return Number.isInteger(v)?String(v):v.toFixed(1);}
function rSB(){
  document.getElementById("sb").innerHTML=FAMILIES.map(f=>{
    const dots=f.members.map(m=>`<span class="sdot" style="background:${gc(gmos(m))}"></span>`).join('');
    return`<div class="fi${aFam===f.id?' active':''}" onclick="showF(${f.id})">
      <div class="fi-row"><div class="fi-icon" style="background:${f.color};color:${f.textColor}">${f.icon}</div>
      <div><div class="fi-name">${f.name}</div><div class="fi-count">${f.members.length} anggota</div></div></div>
      <div class="fi-dots">${dots}</div></div>`;
  }).join('');
}
function showOV(){
  aFam=null;aMem=null;rSB();
  const all=FAMILIES.flatMap(f=>f.members);
  const nD=all.filter(m=>gmos(m)==="danger").length,nW=all.filter(m=>gmos(m)==="warn").length,nO=all.filter(m=>gmos(m)==="ok").length;
  const fc=FAMILIES.map(f=>`<div class="fam-card" onclick="showF(${f.id})">
    <div class="fam-card-hd"><div class="fam-card-icon" style="background:${f.color};color:${f.textColor}">${f.icon}</div>
    <div><div class="fam-card-name">${f.name}</div><div class="fam-card-sub">${f.members.length} anggota</div></div></div>
    <div class="mem-row">${f.members.map(m=>`<div class="mm" onclick="event.stopPropagation();showM(${f.id},${m.id})">
      <div class="mm-av" style="background:${m.color};color:${m.textColor}">${m.initials}</div>
      <div><div class="mm-name">${m.name}</div><div class="mm-age">${m.age}th</div></div>
      <span class="sdot" style="background:${gc(gmos(m))};margin-left:auto"></span>
    </div>`).join('')}</div></div>`).join('');
  document.getElementById("main").innerHTML=`
    <div class="ov-stats">
      <div class="stat"><div class="stat-lbl">Total anggota</div><div class="stat-num">${all.length}</div><div class="stat-sub">${FAMILIES.length} keluarga</div></div>
      <div class="stat"><div class="stat-lbl">Perlu perhatian</div><div class="stat-num" style="color:#E74C3C">${nD+nW}</div><div class="stat-sub">${nD} tinggi · ${nW} borderline</div></div>
      <div class="stat"><div class="stat-lbl">Semua normal</div><div class="stat-num" style="color:#27AE60">${nO}</div><div class="stat-sub">parameter aman</div></div>
    </div>
    <div class="sec-hd">Semua keluarga</div>${fc}`;
}
function showF(fid){
  aFam=fid;aMem=null;if(chart){chart.destroy();chart=null;}rSB();
  const f=FAMILIES.find(x=>x.id===fid);
  const cards=f.members.map(m=>{
    const cells=PARAMS.map(p=>{const v=glv(m,p.key);const ps=v===null?"na":gs(p,v);return`<div class="mc-p"><div class="mc-pl">${p.label}</div><div class="mc-pv" style="color:${gc(ps)}">${fmt(v)}</div><div class="mc-pu">${v===null?"belum dicek":p.unit}</div></div>`;}).join('');
    return`<div class="mc" onclick="showM(${fid},${m.id})">
      <div class="mc-top"><div class="mc-av" style="background:${m.color};color:${m.textColor}">${m.initials}</div>
      <div style="flex:1"><div class="mc-name">${m.name}</div><div class="mc-sub">${m.rel} · ${m.age} th</div></div>
      <span class="sdot" style="background:${gc(gmos(m))}"></span></div>
      <div class="mc-ps">${cells}</div></div>`;
  }).join('');
  document.getElementById("main").innerHTML=`
    <button class="back-btn" onclick="showOV()">&#8592; Semua keluarga</button>
    <div class="fv-hd"><div class="fv-icon" style="background:${f.color};color:${f.textColor}">${f.icon}</div>
    <div><div class="fv-title">${f.name}</div><div class="fv-sub">${f.members.length} anggota · Des 2024</div></div></div>
    <div class="mg">${cards}</div>`;
}
function showM(fid,mid){
  aFam=fid;aMem=mid;aPar="tensi";if(chart){chart.destroy();chart=null;}rSB();
  const f=FAMILIES.find(x=>x.id===fid),m=f.members.find(x=>x.id===mid);
  const isAbs=PARAMS.every(p=>m.data[m.data.length-1][p.key]===null);
  const pc=PARAMS.map(p=>{
    const v=glv(m,p.key),ps=v===null?"na":gs(p,v);
    const pv=m.data.filter(d=>d[p.key]!==null),prev=pv.length>=2?pv[pv.length-2][p.key]:null;
    const diff=v!==null&&prev!==null?parseFloat((v-prev).toFixed(1)):null;
    const ts=diff===null?"":diff>0?`&#8593; ${Math.abs(diff)}`:diff<0?`&#8595; ${Math.abs(diff)}`:"&#8594;";
    const tc=diff===null?"transparent":diff>0?"#E74C3C":diff<0?"#27AE60":"#999";
    return`<div class="p4c" style="border-top-color:${p.color}"><div class="p4l">${p.label}</div><div class="p4v">${fmt(v)}</div><div class="p4u">${v===null?"belum dicek":p.unit}</div><div class="p4s" style="color:${gc(ps)}">${gl(ps)} <span style="color:${tc};margin-left:4px;font-size:11px">${ts}</span></div></div>`;
  }).join('');
  const tabs=PARAMS.map(p=>`<button class="ctab${aPar===p.key?' active':''}" onclick="swTab('${p.key}',${fid},${mid})">${p.label}</button>`).join('');
  const hr=[...m.data].reverse().map((d,i)=>`<tr><td style="font-weight:${i===0?600:400}">${d.m} '24${i===0?' <span class="loz">terbaru</span>':''}</td>${PARAMS.map(p=>{const v=d[p.key];if(v===null)return`<td style="color:#ccc">—</td>`;const ps=gs(p,v);return`<td style="color:${gc(ps)};font-weight:${ps!=='ok'?500:400}">${fmt(v)}</td>`;}).join('')}</tr>`).join('');
  document.getElementById("main").innerHTML=`
    <button class="back-btn" onclick="showF(${fid})">&#8592; ${f.name}</button>
    ${isAbs?'<div class="na-ban">&#128205; Anggota ini belum dicek bulan ini. Data terakhir dari bulan sebelumnya.</div>':''}
    <div class="ind-hd"><div class="ind-av" style="background:${m.color};color:${m.textColor}">${m.initials}</div>
    <div><div class="ind-name">${m.name}</div><div class="ind-sub">${m.rel} · ${m.age} tahun · ${m.gender==="L"?"Laki-laki":"Perempuan"}</div></div></div>
    <div class="p4g">${pc}</div>
    <div class="cw"><div class="ctabs">${tabs}</div><canvas id="tc" height="130"></canvas></div>
    <div style="font-size:10px;font-weight:600;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Riwayat pemeriksaan</div>
    <div style="overflow-x:auto"><table class="ht"><thead><tr><th>Bulan</th>${PARAMS.map(p=>`<th>${p.label}</th>`).join('')}</tr></thead><tbody>${hr}</tbody></table></div>`;
  drawC(m);
}
function drawC(m){
  if(chart){chart.destroy();chart=null;}
  const p=PARAMS.find(x=>x.key===aPar),vd=m.data.filter(d=>d[p.key]!==null);
  const ctx=document.getElementById("tc");if(!ctx)return;
  if(vd.length<2){const c=ctx.getContext("2d");c.fillStyle="#999";c.font="13px sans-serif";c.textAlign="center";c.fillText("Data belum cukup",ctx.offsetWidth/2,60);return;}
  const labels=vd.map(d=>d.m),vals=vd.map(d=>d[p.key]);
  chart=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:vals,borderColor:p.color,backgroundColor:p.color+'18',borderWidth:2,pointBackgroundColor:vals.map(v=>gc(gs(p,v))),pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y} ${p.unit}`,afterLabel:c=>gl(gs(p,c.parsed.y))}}},scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#999',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#999',font:{size:11}},min:Math.min(...vals)*0.93,max:Math.max(...vals)*1.07}}}});
}
function swTab(k,fid,mid){
  aPar=k;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.toggle('active',t.textContent===PARAMS.find(p=>p.key===k).label));
  const f=FAMILIES.find(x=>x.id===fid),m=f.members.find(x=>x.id===mid);drawC(m);
}
showOV();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBA Afiyah — Rekam Medis Keluarga</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.app{width:100%;max-width:900px;border-radius:14px;overflow:hidden;background:#fff;border:1px solid #E0E0D8}
.topbar{background:#0B3020;padding:14px 22px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:#C69328;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:#F0EBE0;letter-spacing:0.02em}
.topbar-sub{font-size:11px;color:#7AA88A;margin-top:1px}
.topbar-badge{background:#1A5438;border:1px solid #2A7050;border-radius:20px;padding:4px 12px;font-size:11px;color:#A8C4B4}
.layout{display:grid;grid-template-columns:210px 1fr;min-height:560px}
.sidebar{background:#0F3826;border-right:1px solid #1A5438}
.sidebar-section{padding:14px 16px 6px;font-size:10px;color:#5A8A6A;letter-spacing:0.08em;text-transform:uppercase}
.fam-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:background 0.15s}
.fam-item:hover{background:rgba(255,255,255,0.05)}
.fam-item.active{background:rgba(198,147,40,0.12);border-left-color:#C69328}
.fam-header-row{display:flex;align-items:center;gap:9px}
.fam-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.fam-name{font-size:13px;font-weight:500;color:#E8DDD0;line-height:1.3}
.fam-count{font-size:11px;color:#7AA88A;margin-top:1px}
.fam-status-row{display:flex;gap:4px;margin-top:6px;padding-left:41px}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.main{padding:20px;background:#fff;overflow:auto}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#666;cursor:pointer;margin-bottom:14px;background:none;border:none;padding:0}
.back-btn:hover{color:#111}
.overview-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#F5F5F0;border-radius:10px;padding:13px 15px}
.stat-lbl{font-size:11px;color:#888;margin-bottom:5px}
.stat-num{font-size:26px;font-weight:600;color:#111;line-height:1}
.stat-sub{font-size:11px;color:#aaa;margin-top:3px}
.section-hd{font-size:10px;font-weight:600;color:#888;letter-spacing:0.06em;margin-bottom:10px;text-transform:uppercase}
.fam-card{background:#fff;border:1px solid #E8E8E0;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.fam-card:hover{border-color:#C0C0B8}
.fam-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.fam-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.fam-card-name{font-size:15px;font-weight:600;color:#111}
.fam-card-sub{font-size:12px;color:#888;margin-top:2px}
.members-row{display:flex;gap:8px;flex-wrap:wrap}
.mini-member{display:flex;align-items:center;gap:7px;background:#F5F5F0;border-radius:8px;padding:7px 10px;flex:1;min-width:120px;cursor:pointer;transition:background 0.15s}
.mini-member:hover{background:#EAEAE3}
.mini-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.mini-name{font-size:12px;font-weight:500;color:#111;line-height:1.2}
.mini-age{font-size:11px;color:#888}
.fam-view-header{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#0B3020;border-radius:12px;margin-bottom:16px}
.fam-view-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600}
.fam-view-title{font-size:17px;font-weight:600;color:#F0EBE0}
.fam-view-sub{font-size:12px;color:#7AA88A;margin-top:3px}
.member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.member-card{background:#fff;border:1px solid #E8E8E0;border-radius:12px;padding:14px;cursor:pointer;transition:border-color 0.15s}
.member-card:hover{border-color:#C0C0B8}
.mc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.mc-name{font-size:14px;font-weight:500;color:#111}
.mc-sub{font-size:12px;color:#888;margin-top:2px}
.mc-params{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.mc-param{background:#F5F5F0;border-radius:8px;padding:7px 9px}
.mc-plbl{font-size:10px;color:#999;margin-bottom:3px}
.mc-pval{font-size:14px;font-weight:600}
.mc-punit{font-size:10px;color:#aaa}
.ind-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #E8E8E0}
.ind-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
.ind-name{font-size:17px;font-weight:600;color:#111}
.ind-sub{font-size:13px;color:#888;margin-top:3px}
.p4grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.p4card{background:#fff;border:1px solid #E8E8E0;border-radius:10px;padding:11px 12px;border-top:3px solid transparent}
.p4lbl{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px}
.p4val{font-size:22px;font-weight:600;color:#111;line-height:1}
.p4unit{font-size:10px;color:#aaa;margin-top:2px}
.p4status{font-size:11px;font-weight:500;margin-top:5px}
.chart-wrap{background:#fff;border:1px solid #E8E8E0;border-radius:10px;padding:14px;margin-bottom:14px}
.chart-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ctab{font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid #E0E0D8;color:#666;background:transparent;transition:all 0.15s}
.ctab:hover{background:#F5F5F0}
.ctab.active{background:#0B3020;color:#F0EBE0;border-color:#0B3020}
.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{text-align:left;padding:7px 9px;font-size:10px;color:#888;font-weight:600;border-bottom:1px solid #E8E8E0;text-transform:uppercase;letter-spacing:0.04em}
.hist-table td{padding:8px 9px;border-bottom:1px solid #E8E8E0;color:#111}
.hist-table tr:last-child td{border-bottom:none}
.lozenge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;background:#EBF5EF;color:#0F6E56}
.na-banner{background:#FFF8EC;border:1px solid #F0D890;border-radius:8px;padding:10px 14px;font-size:12px;color:#7A6010;margin-bottom:12px}
@media(max-width:600px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .p4grid{grid-template-columns:repeat(2,1fr)}
  .member-grid{grid-template-columns:1fr}
  .overview-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

    <div class="topbar-left">

  ]},
  {id:2,name:"Keluarga B",icon:"KB",color:"#7A3A10",textColor:"#F5C4A0",

    {id:201,name:"Ammi B",rel:"Kepala keluarga",age:71,gender:"L",initials:"AB",color:"#7A3A10",textColor:"#F5C4A0",
     data:[{m:"Jul",tensi:155,gula:118,kol:205,au:7.1},{m:"Agu",tensi:158,gula:122,kol:200,au:7.4},{m:"Sep",tensi:152,gula:119,kol:210,au:7.2},{m:"Okt",tensi:160,gula:125,kol:215,au:7.6},{m:"Nov",tensi:156,gula:121,kol:208,au:7.3},{m:"Des",tensi:162,gula:128,kol:220,au:7.8}]},
    {id:202,name:"Amma B",rel:"Istri",age:66,gender:"P",initials:"AM",color:"#7A3A10",textColor:"#F5C4A0",
     data:[{m:"Jul",tensi:118,gula:92,kol:185,au:4.8},{m:"Agu",tensi:115,gula:89,kol:188,au:4.6},{m:"Sep",tensi:120,gula:94,kol:182,au:5.0},{m:"Okt",tensi:117,gula:91,kol:190,au:4.9},{m:"Nov",tensi:119,gula:93,kol:186,au:4.7},{m:"Des",tensi:116,gula:90,kol:184,au:4.8}]},
    {id:203,name:"Cucu B1",rel:"Putri (luar negeri)",age:28,gender:"P",initials:"CB",color:"#7A3A10",textColor:"#F5C4A0",
     data:[{m:"Jul",tensi:null,gula:null,kol:null,au:null},{m:"Agu",tensi:null,gula:null,kol:null,au:null},{m:"Sep",tensi:108,gula:82,kol:162,au:3.8},{m:"Okt",tensi:null,gula:null,kol:null,au:null},{m:"Nov",tensi:110,gula:84,kol:165,au:4.0},{m:"Des",tensi:null,gula:null,kol:null,au:null}]},
  ]},
  {id:3,name:"Keluarga C",icon:"KC",color:"#1A1A5C",textColor:"#AAAAE8",
   members:[
    {id:301,name:"Pakdhe C",rel:"Kepala keluarga",age:65,gender:"L",initials:"PC",color:"#1A1A5C",textColor:"#AAAAE8",
     data:[{m:"Jul",tensi:162,gula:112,kol:225,au:6.8},{m:"Agu",tensi:158,gula:118,kol:220,au:7.0},{m:"Sep",tensi:154,gula:115,kol:215,au:6.9},{m:"Okt",tensi:150,gula:110,kol:210,au:6.7},{m:"Nov",tensi:148,gula:108,kol:205,au:6.6},{m:"Des",tensi:145,gula:106,kol:200,au:6.5}]},
    {id:302,name:"Budhe C",rel:"Istri",age:60,gender:"P",initials:"BC",color:"#1A1A5C",textColor:"#AAAAE8",

    {id:303,name:"Cucu C1",rel:"Putra",age:23,gender:"L",initials:"CC",color:"#1A1A5C",textColor:"#AAAAE8",
     data:[{m:"Jul",tensi:112,gula:84,kol:162,au:4.8},{m:"Agu",tensi:110,gula:82,kol:158,au:4.6},{m:"Sep",tensi:114,gula:86,kol:165,au:4.9},{m:"Okt",tensi:111,gula:83,kol:160,au:4.7},{m:"Nov",tensi:113,gula:85,kol:163,au:4.8},{m:"Des",tensi:112,gula:84,kol:161,au:4.7}]},
  ]},
  {id:4,name:"Keluarga D",icon:"KD",color:"#4A1A38",textColor:"#E8A8C8",
   members:[
    {id:401,name:"Pakdhe D",rel:"Kepala keluarga",age:69,gender:"L",initials:"PD",color:"#4A1A38",textColor:"#E8A8C8",
     data:[{m:"Jul",tensi:134,gula:108,kol:210,au:6.5},{m:"Agu",tensi:136,gula:112,kol:215,au:6.7},{m:"Sep",tensi:132,gula:110,kol:208,au:6.4},{m:"Okt",tensi:138,gula:115,kol:218,au:6.8},{m:"Nov",tensi:135,gula:111,kol:212,au:6.6},{m:"Des",tensi:140,gula:116,kol:220,au:6.9}]},
    {id:402,name:"Budhe D",rel:"Istri",age:65,gender:"P",initials:"BD",color:"#4A1A38",textColor:"#E8A8C8",
     data:[{m:"Jul",tensi:124,gula:96,kol:195,au:5.1},{m:"Agu",tensi:120,gula:94,kol:198,au:5.0},{m:"Sep",tensi:126,gula:98,kol:192,au:5.2},{m:"Okt",tensi:122,gula:95,kol:200,au:5.3},{m:"Nov",tensi:128,gula:99,kol:196,au:5.1},{m:"Des",tensi:125,gula:97,kol:202,au:5.2}]},
    {id:403,name:"Cucu D1",rel:"Putra",age:38,gender:"L",initials:"CD",color:"#4A1A38",textColor:"#E8A8C8",
     data:[{m:"Jul",tensi:122,gula:90,kol:182,au:5.5},{m:"Agu",tensi:120,gula:88,kol:178,au:5.4},{m:"Sep",tensi:124,gula:92,kol:185,au:5.6},{m:"Okt",tensi:119,gula:87,kol:176,au:5.3},{m:"Nov",tensi:123,gula:91,kol:181,au:5.5},{m:"Des",tensi:121,gula:89,kol:179,au:5.4}]},
  ]},
];
const PARAMS=[
  {key:"tensi",label:"Tekanan Darah",unit:"mmHg",color:"#E05252",normal:[0,129],warn:[130,139],danger:[140,999]},
  {key:"gula",label:"Gula Darah",unit:"mg/dL",color:"#4A90D9",normal:[0,99],warn:[100,125],danger:[126,999]},
  {key:"kol",label:"Kolesterol",unit:"mg/dL",color:"#9B59B6",normal:[0,199],warn:[200,239],danger:[240,999]},
  {key:"au",label:"Asam Urat",unit:"mg/dL",color:"#E67E22",normal:[0,6.9],warn:[7.0,7.9],danger:[8.0,999]},
];
let view="overview",activeFamId=null,activeMemberId=null,activeParam="tensi",chartInst=null;
function getStatus(p,v){if(v===null)return"na";if(v>=p.danger[0])return"danger";if(v>=p.warn[0])return"warn";return"ok";}
function getStatusColor(s){return s==="ok"?"#27AE60":s==="warn"?"#F39C12":s==="danger"?"#E74C3C":"#BBB";}
function getStatusLabel(s){return s==="ok"?"Normal":s==="warn"?"Borderline":s==="danger"?"Tinggi":"Belum dicek";}
function getMOS(m){const last=m.data[m.data.length-1];for(const p of PARAMS){if(getStatus(p,last[p.key])==="danger")return"danger";}for(const p of PARAMS){if(getStatus(p,last[p.key])==="warn")return"warn";}if(PARAMS.every(p=>last[p.key]===null))return"na";return"ok";}
function getLastVal(m,key){for(let i=m.data.length-1;i>=0;i--){if(m.data[i][key]!==null)return m.data[i][key];}return null;}
function fmt(v){if(v===null)return"—";return Number.isInteger(v)?String(v):v.toFixed(1);}
function renderSidebar(){
  document.getElementById("sidebar-list").innerHTML=FAMILIES.map(f=>{
    const isActive=(activeFamId===f.id);
    const dots=f.members.map(m=>`<span class="sdot" style="background:${getStatusColor(getMOS(m))}"></span>`).join('');
    return`<div class="fam-item${isActive?' active':''}" onclick="showFamily(${f.id})">
      <div class="fam-header-row">
        <div class="fam-icon" style="background:${f.color};color:${f.textColor}">${f.icon}</div>
        <div><div class="fam-name">${f.name}</div><div class="fam-count">${f.members.length} anggota</div></div>
      </div>
      <div class="fam-status-row">${dots}</div>
    </div>`;
  }).join('');
}
function renderOverview(){
  view="overview";activeFamId=null;activeMemberId=null;renderSidebar();
  const all=FAMILIES.flatMap(f=>f.members);
  const nD=all.filter(m=>getMOS(m)==="danger").length,nW=all.filter(m=>getMOS(m)==="warn").length,nO=all.filter(m=>getMOS(m)==="ok").length;
  const famCards=FAMILIES.map(f=>`
    <div class="fam-card" onclick="showFamily(${f.id})">
      <div class="fam-card-header">
        <div class="fam-card-icon" style="background:${f.color};color:${f.textColor}">${f.icon}</div>
        <div><div class="fam-card-name">${f.name}</div><div class="fam-card-sub">${f.members.length} anggota terdaftar</div></div>
      </div>
      <div class="members-row">${f.members.map(m=>`
        <div class="mini-member" onclick="event.stopPropagation();showMember(${f.id},${m.id})">
          <div class="mini-av" style="background:${m.color};color:${m.textColor}">${m.initials}</div>
          <div><div class="mini-name">${m.name}</div><div class="mini-age">${m.age}th</div></div>
          <span class="sdot" style="background:${getStatusColor(getMOS(m))};margin-left:auto"></span>
        </div>`).join('')}</div>
    </div>`).join('');
  document.getElementById("main").innerHTML=`
    <div class="overview-stats">
      <div class="stat-card"><div class="stat-lbl">Total anggota</div><div class="stat-num">${all.length}</div><div class="stat-sub">${FAMILIES.length} keluarga</div></div>
      <div class="stat-card"><div class="stat-lbl">Perlu perhatian</div><div class="stat-num" style="color:#E74C3C">${nD+nW}</div><div class="stat-sub">${nD} tinggi · ${nW} borderline</div></div>
      <div class="stat-card"><div class="stat-lbl">Semua normal</div><div class="stat-num" style="color:#27AE60">${nO}</div><div class="stat-sub">parameter aman</div></div>
    </div>
    <div class="section-hd">Semua keluarga</div>${famCards}`;
}
function showFamily(famId){
  view="family";activeFamId=famId;activeMemberId=null;if(chartInst){chartInst.destroy();chartInst=null;}renderSidebar();
  const f=FAMILIES.find(x=>x.id===famId);
  const cards=f.members.map(m=>{
    const cells=PARAMS.map(p=>{const v=getLastVal(m,p.key);const ps=v===null?"na":getStatus(p,v);return`<div class="mc-param"><div class="mc-plbl">${p.label}</div><div class="mc-pval" style="color:${getStatusColor(ps)}">${fmt(v)}</div><div class="mc-punit">${v===null?"belum dicek":p.unit}</div></div>`;}).join('');
    return`<div class="member-card" onclick="showMember(${famId},${m.id})">
      <div class="mc-top"><div class="mc-av" style="background:${m.color};color:${m.textColor}">${m.initials}</div><div style="flex:1"><div class="mc-name">${m.name}</div><div class="mc-sub">${m.rel} · ${m.age} th</div></div><span class="sdot" style="background:${getStatusColor(getMOS(m))}"></span></div>
      <div class="mc-params">${cells}</div></div>`;
  }).join('');
  document.getElementById("main").innerHTML=`
    <button class="back-btn" onclick="renderOverview()">&#8592; Semua keluarga</button>
    <div class="fam-view-header"><div class="fam-view-icon" style="background:${f.color};color:${f.textColor}">${f.icon}</div><div><div class="fam-view-title">${f.name}</div><div class="fam-view-sub">${f.members.length} anggota · Des 2024</div></div></div>
    <div class="member-grid">${cards}</div>`;
}
function showMember(famId,memberId){
  view="member";activeFamId=famId;activeMemberId=memberId;activeParam="tensi";if(chartInst){chartInst.destroy();chartInst=null;}renderSidebar();
  const f=FAMILIES.find(x=>x.id===famId),m=f.members.find(x=>x.id===memberId);
  const isAbsent=PARAMS.every(p=>m.data[m.data.length-1][p.key]===null);
  const pCards=PARAMS.map(p=>{
    const v=getLastVal(m,p.key),ps=v===null?"na":getStatus(p,v);
    const prevs=m.data.filter(d=>d[p.key]!==null),prev=prevs.length>=2?prevs[prevs.length-2][p.key]:null;
    const diff=v!==null&&prev!==null?parseFloat((v-prev).toFixed(1)):null;
    const tStr=diff===null?"":diff>0?`&#8593; ${Math.abs(diff)}`:diff<0?`&#8595; ${Math.abs(diff)}`:"&#8594;";
    const tCol=diff===null?"transparent":diff>0?"#E74C3C":diff<0?"#27AE60":"#999";
    return`<div class="p4card" style="border-top-color:${p.color}"><div class="p4lbl">${p.label}</div><div class="p4val">${fmt(v)}</div><div class="p4unit">${v===null?"belum dicek":p.unit}</div><div class="p4status" style="color:${getStatusColor(ps)}">${getStatusLabel(ps)} <span style="color:${tCol};margin-left:4px;font-size:11px">${tStr}</span></div></div>`;
  }).join('');
  const tabs=PARAMS.map(p=>`<button class="ctab${activeParam===p.key?' active':''}" onclick="switchTab('${p.key}',${famId},${memberId})">${p.label}</button>`).join('');
  const histRows=[...m.data].reverse().map((d,i)=>`<tr><td style="font-weight:${i===0?600:400}">${d.m} '24${i===0?' <span class="lozenge">terbaru</span>':''}</td>${PARAMS.map(p=>{const v=d[p.key];if(v===null)return`<td style="color:#ccc">—</td>`;const ps=getStatus(p,v);return`<td style="color:${getStatusColor(ps)};font-weight:${ps!=='ok'?500:400}">${fmt(v)}</td>`;}).join('')}</tr>`).join('');
  document.getElementById("main").innerHTML=`
    <button class="back-btn" onclick="showFamily(${famId})">&#8592; ${f.name}</button>
    ${isAbsent?'<div class="na-banner">&#128205; Anggota ini belum dicek bulan ini. Data terakhir dari bulan sebelumnya.</div>':''}
    <div class="ind-header"><div class="ind-av" style="background:${m.color};color:${m.textColor}">${m.initials}</div><div><div class="ind-name">${m.name}</div><div class="ind-sub">${m.rel} · ${m.age} tahun · ${m.gender==="L"?"Laki-laki":"Perempuan"}</div></div></div>
    <div class="p4grid">${pCards}</div>
    <div class="chart-wrap"><div class="chart-tabs">${tabs}</div><canvas id="trendChart" height="130"></canvas></div>
    <div style="font-size:10px;font-weight:600;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Riwayat pemeriksaan</div>
    <div style="overflow-x:auto"><table class="hist-table"><thead><tr><th>Bulan</th>${PARAMS.map(p=>`<th>${p.label}</th>`).join('')}</tr></thead><tbody>${histRows}</tbody></table></div>`;
  drawChart(m);
}
function drawChart(m){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const p=PARAMS.find(x=>x.key===activeParam),valid=m.data.filter(d=>d[p.key]!==null);
  const ctx=document.getElementById("trendChart");if(!ctx)return;
  if(valid.length<2){const c=ctx.getContext("2d");c.fillStyle="#999";c.font="13px sans-serif";c.textAlign="center";c.fillText("Data belum cukup",ctx.offsetWidth/2,60);return;}
  const labels=valid.map(d=>d.m),vals=valid.map(d=>d[p.key]);
  chartInst=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:vals,borderColor:p.color,backgroundColor:p.color+'18',borderWidth:2,pointBackgroundColor:vals.map(v=>getStatusColor(getStatus(p,v))),pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y} ${p.unit}`,afterLabel:c=>getStatusLabel(getStatus(p,c.parsed.y))}}},scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#999',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#999',font:{size:11}},min:Math.min(...vals)*0.93,max:Math.max(...vals)*1.07}}}});
}
function switchTab(key,famId,memberId){
  activeParam=key;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.toggle('active',t.textContent===PARAMS.find(p=>p.key===key).label));
  const f=FAMILIES.find(x=>x.id===famId),m=f.members.find(x=>x.id===memberId);drawChart(m);
}
renderOverview();
</script>
</body>
</html>
